<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ffffff, #f8f8f8);
    color: black;
    text-align: center;
    overflow-x: hidden;
}

/* Gold particles */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Container */
.container {
    padding: 20px;
}

.ganesh {
    width: 70px;
    margin-top: 10px;
}

/* Gold gradient text */
.gold {
    background: linear-gradient(45deg, #d4af37, #fff5cc, #d4af37);
    -webkit-background-clip: text;
    color: transparent;
}

.title {
    font-size: 42px;
    font-family: 'Playfair Display', serif;
    margin: 10px 0;
}

.names {
    font-size: 34px;
    margin: 20px 0;
}

/* Image */
.couple {
    width: 260px;
    border-radius: 15px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 15px rgba(212,175,55,0.5);
    transition: 0.4s;
}
.couple:hover {
    transform: scale(1.05);
}

/* Info */
.info {
    font-size: 18px;
    margin: 20px 0;
}

a {
    color: #b8962e;
    font-weight: bold;
}

/* Analog countdown */
.clock {
    width: 180px;
    height: 180px;
    border: 3px solid #d4af37;
    border-radius: 50%;
    margin: 30px auto;
    position: relative;
    background: white;
}

.hand {
    position: absolute;
    width: 50%;
    height: 2px;
    background: #d4af37;
    top: 50%;
    left: 50%;
    transform-origin: left;
}

/* Typing */
.typing {
    width: 85%;
    margin: auto;
    border-right: 2px solid #d4af37;
    white-space: nowrap;
    overflow: hidden;
    font-size: 18px;
}

/* Mobile */
@media(max-width:600px){
    .title { font-size: 30px; }
    .names { font-size: 24px; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Ganesha_icon.png" class="ganesh">

<div class="title gold">Wedding Invitation</div>

<p>We warmly invite you to celebrate our special day</p>

<div class="names gold">
PRADEEP KUMAR B L <br> ❤️ <br> SHILPA B M
</div>

<img src="https://via.placeholder.com/260" class="couple">

<div class="info">
<p><b>Date:</b> April 26, 2026</p>
<p><b>Venue:</b> Sri Jagadguru Renukacharya Convention Hall, Chikkamagaluru</p>
<p><a href="https://maps.google.com" target="_blank">View Map</a></p>
</div>

<!-- Analog Clock -->
<div class="clock">
    <div id="dayHand" class="hand"></div>
</div>

<!-- Typing Letter -->
<div class="typing" id="letter"></div>

</div>

<script>
// Analog countdown
const wedding = new Date("April 26, 2026 10:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = wedding - now;

    let days = diff / (1000*60*60*24);
    let angle = (days % 30) * 12;

    document.getElementById("dayHand").style.transform =
        `rotate(${angle}deg)`;
},1000);

// Typing effect
const msg = "With love in our hearts, we invite you to join us as we begin our forever journey. Your presence will make our celebration truly unforgettable.";
let i=0;

function typing(){
    if(i < msg.length){
        document.getElementById("letter").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing,35);
    }
}
typing();

// Gold particles (softer for white bg)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5,
        d: Math.random()*1.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(212,175,55,0.6)";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if(p.y > canvas.height){
            p.y = 0;
        }
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
