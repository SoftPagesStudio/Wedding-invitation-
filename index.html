<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinematic Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Poppins;
    text-align:center;
    overflow-x:hidden;
}

/* Intro animation */
.container{
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(1.1);}
    to{opacity:1; transform:scale(1);}
}

/* Ganesh glow */
.ganesh{
    width:80px;
    animation: glow 2s infinite alternate;
}
@keyframes glow{
    from{filter: drop-shadow(0 0 5px gold);}
    to{filter: drop-shadow(0 0 20px gold);}
}

/* Gold text */
.gold{
    background: linear-gradient(45deg,gold,#fff,gold);
    -webkit-background-clip:text;
    color:transparent;
}

.title{
    font-size:42px;
    font-family:Playfair Display;
}

/* Names */
.names{
    font-size:34px;
    margin:20px;
}

/* Rings animation */
.rings{
    width:100px;
    height:100px;
    margin:auto;
    border:3px solid gold;
    border-radius:50%;
    position:relative;
    animation: rotate 6s linear infinite;
}
.rings::after{
    content:'';
    position:absolute;
    width:100px;
    height:100px;
    border:3px solid gold;
    border-radius:50%;
    top:10px;
    left:10px;
}
@keyframes rotate{
    100%{transform:rotate(360deg);}
}

/* Countdown circle */
svg{
    margin:20px;
}
circle{
    fill:none;
    stroke:gold;
    stroke-width:6;
    stroke-dasharray:440;
    stroke-dashoffset:440;
    animation: countdown 10s linear infinite;
}
@keyframes countdown{
    to{stroke-dashoffset:0;}
}

/* Image */
.couple{
    width:260px;
    border-radius:15px;
    border:2px solid gold;
    box-shadow:0 0 20px gold;
}

/* Map */
iframe{
    width:90%;
    height:200px;
    border:0;
    border-radius:10px;
}

/* Typing */
.typing{
    width:85%;
    margin:auto;
    border-right:2px solid gold;
    white-space:nowrap;
    overflow:hidden;
}

/* Gold particles */
canvas{
    position:fixed;
    top:0;
    z-index:-1;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Ganesha_icon.png" class="ganesh">

<div class="title gold">Wedding Invitation</div>

<p>With divine blessings, we invite you</p>

<div class="names gold">
PRADEEP KUMAR B L <br> ❤️ <br> SHILPA B M
</div>

<div class="rings"></div>

<img src="https://via.placeholder.com/260" class="couple">

<p><b>Date:</b> April 26, 2026</p>
<p><b>Venue:</b> Sri Jagadguru Renukacharya Convention Hall, Chikkamagaluru</p>

<!-- Live Map -->
<iframe src="https://maps.google.com/maps?q=chikkamagaluru&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

<!-- Countdown SVG -->
<svg width="160" height="160">
<circle cx="80" cy="80" r="70"></circle>
</svg>

<!-- Typing letter -->
<div id="letter" class="typing"></div>

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// typing letter
let text="With love, we begin our forever journey. Your presence will make our special day unforgettable.";
let i=0;

function type(){
 if(i<text.length){
  document.getElementById("letter").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,40);
 }
}
type();

// particles
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<80;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle="gold";
 p.forEach(a=>{
  ctx.beginPath();
  ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
  ctx.fill();
  a.y+=1;
  if(a.y>c.height)a.y=0;
 });
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
